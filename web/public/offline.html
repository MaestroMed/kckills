<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hors ligne — KCKILLS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #010A13;
      color: #F0E6D2;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 420px;
    }
    .diamond {
      display: inline-block;
      width: 60px;
      height: 60px;
      border: 3px solid #C8AA6E;
      transform: rotate(45deg);
      margin-bottom: 2rem;
      animation: pulse 2s ease-in-out infinite;
    }
    .diamond::after {
      content: '';
      display: block;
      width: 20px;
      height: 20px;
      margin: 17px auto;
      background: #C8AA6E;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: rotate(45deg) scale(1); }
      50% { opacity: 0.5; transform: rotate(45deg) scale(0.9); }
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    h1 span { color: #C8AA6E; }
    p {
      color: #A09B8C;
      font-size: 0.875rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    button {
      background: linear-gradient(135deg, #C89B3C, #785A28);
      color: #010A13;
      border: none;
      padding: 0.75rem 2rem;
      font-size: 0.875rem;
      font-weight: 700;
      border-radius: 0.75rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }
    button:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="container">
    <div class="diamond"></div>
    <h1>KC<span>KILLS</span></h1>
    <p>Tu es hors ligne. Reconnecte-toi pour voir les derniers kills KC.</p>
    <button onclick="location.reload()">Recharger</button>
  </div>
</body>
</html>
