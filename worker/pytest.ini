[pytest]
# Minimal pytest config for the worker test suite.
#
# asyncio_mode = auto  → @pytest.mark.asyncio coroutines run without
#                        boilerplate ; matches the existing
#                        test_scheduler.py + test_harvester.py style
#                        which mix sync + async test fns.
#
# markers      → register `integration` so `pytest -m "not integration"`
#                excludes the live-DB e2e suite from the unit-test CI run.
#
# testpaths    → only look in tests/ ; the assorted backfill_*.py and
#                check_*.py scripts at the worker root are NOT tests.

asyncio_mode = auto

testpaths = tests

markers =
    integration: hits a real Supabase DB ; skip in unit-test CI (use -m "not integration").
